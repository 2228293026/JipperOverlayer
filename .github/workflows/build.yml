name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_PATH: JipperOverlayer/JipperOverlayer.csproj

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build (Release)
        run: msbuild $env:PROJECT_PATH -restore -p:Configuration=Release

      - name: Upload DLL
        uses: actions/upload-artifact@v7
        with:
          name: JipperOverlayer
          path: JipperOverlayer/bin/Release/JipperOverlayer.dll

  package:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: JipperOverlayer
          path: ./

      - name: Prepare mod package
        run: |
          mkdir -p output

          # Core mod files
          cp JipperOverlayer.dll output/
          cp Info.json output/

          # Asset bundles (rename for runtime version detection)
          cp JipperOverlayer-Unity/Assets/AssetBundles2022/jipperoverlayerbundle output/jipperoverlayerbundle2022
          cp JipperOverlayer-Unity/Assets/AssetBundles6000/jipperoverlayerbundle output/jipperoverlayerbundle6000

      - name: Create zip
        run: |
          cd output && zip -r ../JipperOverlayer.zip . && cd ..

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: JipperOverlayer-Package
          path: JipperOverlayer.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: JipperOverlayer-Package
          path: ./

      - name: Extract release notes
        shell: pwsh
        run: |
          $root = "${{ github.workspace }}"
          $tag = "${{ github.ref_name }}"
          $lines = Get-Content "$root/CHANGELOG.md"
          $in = $false; $out = @()
          foreach ($line in $lines) {
            if ($line -match "^## $tag") { $in = $true; continue }
            if ($in -and $line -match "^## ") { break }
            if ($in) { $out += $line }
          }
          $body = $out -join "`n"
          if ($body.Trim() -eq "") { $body = "See CHANGELOG.md for details." }
          $body | Set-Content relnotes.md -Encoding utf8

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: JipperOverlayer.zip
          prerelease: ${{ contains(github.ref, '-') }}
          body_path: relnotes.md
          generate_release_notes: true
